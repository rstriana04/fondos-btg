      <text x="14" y="19" text-anchor="middle" fill="white" font-size="14" font-weight="700">B</text>
    </svg>
    <span class="logo-text">FondosBTG</span>

  <nav class="sidebar-nav">

        <rect x="3" y="3" width="7" height="7" rx="1"/>
