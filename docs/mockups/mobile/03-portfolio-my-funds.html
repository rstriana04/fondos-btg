<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400">
<title>FondosBTG - Portfolio / My Funds</title>
<style>
body{margin:0;padding:40px;background:#E8ECF1;font-family:-apple-system,system-ui,sans-serif;display:flex;justify-content:center}
.phone{width:320px;min-height:640px;border-radius:28px;border:2px solid #D3D1C7;overflow:hidden;position:relative;background:#FFFFFF}
.sb{background:#0A2647;padding:8px 20px;display:flex;justify-content:space-between;font-size:11px;color:#B5D4F4}
.hd{background:#0A2647;padding:0 20px 16px;color:white}
.hd h2{font-size:16px;font-weight:500;margin:0;color:#FFFFFF}
.bd{padding:16px 16px 80px;background:#F5F7FA}
.st{font-size:14px;font-weight:500;color:#444441;margin:0 0 10px}
.summary{background:#FFFFFF;border-radius:12px;padding:14px;margin-bottom:16px;border:0.5px solid #E8ECF1;text-align:center}
.fc{background:#FFFFFF;border-radius:12px;padding:14px;margin-bottom:10px;border:0.5px solid #E8ECF1}
.fc-row{display:flex;justify-content:space-between;align-items:center}
.fn{font-size:13px;font-weight:500;color:#0A2647;margin:0 0 2px}
.fm{font-size:13px;font-weight:500;color:#0A2647}
.fd{font-size:11px;color:#888780;margin:0}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:6px;margin-bottom:4px}
.badge-fpv{background:#E6F1FB;color:#0C447C}
.badge-fic{background:#EEEDFE;color:#3C3489}
.btn-cancel{background:transparent;border:0.5px solid #E24B4A;color:#A32D2D;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;margin-top:8px}
.bnav{position:absolute;bottom:0;left:0;right:0;background:#FFFFFF;border-top:0.5px solid #E8ECF1;display:flex;justify-content:space-around;padding:10px 0 18px}
.ni{text-align:center;font-size:10px;color:#888780}
.ni.ac{color:#2C74B3}
</style>
</head>
<body>
<!--
  MOCKUP: Portfolio / My Funds Screen
  SCREEN: Active subscriptions overview
  NAVIGATION: Tab "Mis fondos" (active)
  
  DESIGN NOTES:
  - Same navy header as home but with "Mis fondos" title
  - Summary card at top showing:
    - "Saldo disponible" label (11px, #888780)
    - Balance amount (24px, bold, #0A2647)
    - "Invertido: $XXX" in green (#085041)
  - Active fund cards similar to home but with:
    - Category badge (FPV/FIC)
    - Fund name + subscription date
    - Amount invested on the right
    - "Cancelar suscripción" button: transparent bg, red border (#E24B4A), red text (#A32D2D)
  - Section title shows count: "Fondos activos (2)"
-->
<div class="phone">
  <div class="sb"><span>9:41</span><span>···</span></div>
  <div class="hd"><h2>Mis fondos</h2></div>
  <div class="bd">
    <div class="summary">
      <div style="font-size:11px;color:#888780">Saldo disponible</div>
      <div style="font-size:24px;font-weight:500;color:#0A2647;margin:4px 0 4px">$300.000</div>
      <div style="font-size:11px;color:#085041">Invertido: $200.000</div>
    </div>
    <div class="st">Fondos activos (2)</div>
    <div class="fc">
      <span class="badge badge-fpv">FPV</span>
      <div class="fc-row">
        <div>
          <div class="fn">FPV BTG Pactual Recaudadora</div>
          <div class="fd">Suscrito: 25 mar 2026</div>
        </div>
        <div class="fm">$75.000</div>
      </div>
      <button class="btn-cancel">Cancelar suscripción</button>
    </div>
    <div class="fc">
      <span class="badge badge-fpv">FPV</span>
      <div class="fc-row">
        <div>
          <div class="fn">FPV BTG Pactual Ecopetrol</div>
          <div class="fd">Suscrito: 25 mar 2026</div>
        </div>
        <div class="fm">$125.000</div>
      </div>
      <button class="btn-cancel">Cancelar suscripción</button>
    </div>
  </div>
  <div class="bnav">
    <div class="ni">
      <svg width="20" height="20" viewBox="0 0 20 20" style="display:block;margin:0 auto 3px"><rect x="2" y="10" width="4" height="8" rx="1" fill="#B4B2A9"/><rect x="8" y="6" width="4" height="12" rx="1" fill="#B4B2A9"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#B4B2A9"/></svg>
      Fondos</div>
    <div class="ni ac">
      <svg width="20" height="20" viewBox="0 0 20 20" style="display:block;margin:0 auto 3px"><rect x="2" y="3" width="16" height="4" rx="1" fill="#2C74B3"/><rect x="2" y="9" width="16" height="4" rx="1" fill="#2C74B3"/><rect x="2" y="15" width="10" height="4" rx="1" fill="#2C74B3"/></svg>
      Mis fondos</div>
    <div class="ni">
      <svg width="20" height="20" viewBox="0 0 20 20" style="display:block;margin:0 auto 3px"><circle cx="10" cy="10" r="7" fill="none" stroke="#B4B2A9" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="#B4B2A9" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      Historial</div>
  </div>
</div>
</body>
</html>
